<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: rounded purple square so the keyboard reads as a base
       even at very small sizes where individual keys won't be visible. -->
  <rect x="4" y="36" width="120" height="84" rx="14" fill="#6d4aff"/>

  <!-- Keys: three rows. Light fill so they read as keys against the purple
       at >=32px and dissolve into a soft texture at 16px. -->
  <g fill="#fff" fill-opacity="0.45">
    <!-- top row -->
    <rect x="14" y="50" width="12" height="12" rx="2"/>
    <rect x="30" y="50" width="12" height="12" rx="2"/>
    <rect x="46" y="50" width="12" height="12" rx="2"/>
    <rect x="62" y="50" width="12" height="12" rx="2"/>
    <rect x="78" y="50" width="12" height="12" rx="2"/>
    <rect x="94" y="50" width="12" height="12" rx="2"/>
    <rect x="110" y="50" width="4" height="12" rx="2"/>
    <!-- middle row -->
    <rect x="14" y="68" width="12" height="12" rx="2"/>
    <rect x="30" y="68" width="12" height="12" rx="2"/>
    <rect x="46" y="68" width="12" height="12" rx="2"/>
    <rect x="62" y="68" width="12" height="12" rx="2"/>
    <rect x="78" y="68" width="12" height="12" rx="2"/>
    <rect x="94" y="68" width="12" height="12" rx="2"/>
    <rect x="110" y="68" width="4" height="12" rx="2"/>
    <!-- spacebar row -->
    <rect x="14" y="86" width="14" height="12" rx="2"/>
    <rect x="32" y="86" width="58" height="12" rx="2"/>
    <rect x="94" y="86" width="20" height="12" rx="2"/>
  </g>

  <!-- Envelope, sitting on top of the keyboard, slightly larger than the
       keyboard's width:height ratio so it's the dominant feature at 16px. -->
  <g transform="translate(28 6)">
    <!-- Body -->
    <rect x="0" y="0" width="72" height="48" rx="5"
          fill="#fff" stroke="#3d2a99" stroke-width="3"/>
    <!-- Flap -->
    <path d="M 3 4 L 36 28 L 69 4"
          fill="none" stroke="#3d2a99" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
